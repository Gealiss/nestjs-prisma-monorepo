<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello World | Simple Vite App</title>
    <meta name="description" content="A premium Hello World landing page built with Vite and Vanilla CSS.">
    <link rel="stylesheet" href="./style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-glow"></div>
    <main class="container">
        <div class="glass-card">
            <h1 id="title" class="gradient-text">Hello World</h1>
            <p class="subtitle">Experience the future of minimalist web design.</p>
            
            <!-- A test element to display the API URL from env file -->
            <div class="env-info">
                <span class="label">API Endpoint:</span>
                <code id="api-url">Loading...</code>
            </div>
            
            <div class="health-section">
                <button id="health-btn" type="button" class="primary-btn">Check API Health</button>
                <div id="health-result" class="result-area hidden">
                    <span class="label">Response Status:</span>
                    <pre id="response-content">Waiting...</pre>
                </div>
            </div>

            <div class="badge">Vite Powered</div>
        </div>
    </main>
    <script type="module" src="./main.js"></script>
</body>
</html>
